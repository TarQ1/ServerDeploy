---
# RAID1 setup tasks

- name: Ensure mdadm is installed
  ansible.builtin.package:
    name: mdadm
    state: present

- name: Check if RAID1 array already exists
  ansible.builtin.stat:
    path: "{{ raid_device }}"
  register: raid_device_stat

- name: Wipe filesystem signatures from devices
  ansible.builtin.shell: |
    wipefs -a {{ item }}
  loop: "{{ raid_devices }}"
  when:
    - not raid_device_stat.stat.exists
    - raid_allow_wipe | bool
  failed_when: false

- name: Zero superblock on devices
  ansible.builtin.shell: |
    mdadm --zero-superblock {{ item }} 2>/dev/null || true
  loop: "{{ raid_devices }}"
  when:
    - not raid_device_stat.stat.exists
    - raid_allow_wipe | bool
  failed_when: false

- name: Create RAID1 array
  ansible.builtin.shell: |
    yes | mdadm --create {{ raid_device }} \
      --level=1 \
      --raid-devices=2 \
      --metadata=1.2 \
      --bitmap=internal \
      {{ raid_devices | join(' ') }}
  when: not raid_device_stat.stat.exists
  register: raid_create_result
  changed_when: "'added to' in raid_create_result.stdout or 'created' in raid_create_result.stdout"

- name: Wait for RAID1 array to be created
  ansible.builtin.wait_for:
    timeout: 30
  when: raid_create_result is changed

- name: Detect actual RAID device name
  ansible.builtin.shell: |
    readlink -f {{ raid_device }} || ls /dev/md* | grep -v 'md[0-9]p' | head -n1
  register: actual_raid_device
  changed_when: false
  when: raid_create_result is changed

- name: Set RAID device fact
  ansible.builtin.set_fact:
    raid_device_path: "{{ actual_raid_device.stdout if actual_raid_device.stdout else raid_device }}"
  when: raid_create_result is changed

- name: Create filesystem on RAID1 device
  ansible.builtin.filesystem:
    fstype: "{{ raid_fstype }}"
    dev: "{{ raid_device_path | default(raid_device) }}"
    force: no
  when: raid_create_result is changed or (raid_device_stat.stat.exists and raid_create_result is not changed)

- name: Save RAID1 configuration to mdadm.conf
  ansible.builtin.shell: |
    mdadm --detail --scan
  register: mdadm_scan_output
  changed_when: false
  when: raid_create_result is changed

- name: Ensure /etc/mdadm directory exists
  ansible.builtin.file:
    path: /etc/mdadm
    state: directory
    mode: '0755'

- name: Update mdadm.conf with RAID1 details
  ansible.builtin.lineinfile:
    path: /etc/mdadm/mdadm.conf
    line: "{{ mdadm_scan_output.stdout_lines[-1] }}"
    create: true
    state: present
  failed_when: false
  when: raid_create_result is changed

# add PROGRAM line to mdadm.conf if not present
- name: Ensure mdadm monitor PROGRAM line is present in mdadm.conf
  ansible.builtin.lineinfile:
    path: /etc/mdadm/mdadm.conf
    line: "PROGRAM /usr/local/alert-raid.sh"
    create: true
    state: present
  failed_when: false
  ignore_errors: true

# Ensure mdmonitor service is started
- name: Start mdmonitor service
  ansible.builtin.service:
    name: mdmonitor
    state: started
    enabled: yes
  failed_when: false
  ignore_errors: true

- name: Display RAID1 status
  ansible.builtin.shell: |
    mdadm --detail {{ raid_device }}
  register: raid_status
  changed_when: false

- name: Show RAID1 status output
  ansible.builtin.debug:
    msg: "{{ raid_status.stdout_lines }}"
